on:
  push:
    branches: main

jobs:
  cppcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck and annotate
        run: |
          cppcheck \
            --enable=all \
            --inconclusive \
            --force \
            --std=c11 \
            --template=github \
            -I Core/Inc \
            -i Drivers \
            -i Middlewares \
            Core/Src \
            2> cppcheck.log || true

          # Fail the job only if "error:" is in the output
          if grep -q "error:" cppcheck.log; then
            echo "Cppcheck found errors!"
            exit 1
          fi

          # Show warnings in the log (annotations are already posted)
          grep "warning:" cppcheck.log || true
